<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Cards — EA Database</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#ffffff;--surface2:#ece9e3;--surface3:#e2dfd8;
  --navy:#0b1628;--navy2:#1a2d4f;--gold:#a07010;--gold-lt:#fdf3d8;
  --tx:#0b1628;--tx2:#5a6070;--tx3:#9098a8;
  --g:#1a5c2a;--g-bg:#e5f4ea;--g2:#2a8040;
  --a:#7a4500;--a-bg:#fef3de;
  --r:#8b1c1c;--r-bg:#fde8e8;
  --b:#0e3a8a;--b-bg:#e5eefb;
  --p:#5a1a8a;--p-bg:#f0e5fb;
  --teal:#0a5a5a;--teal-bg:#e0f4f4;
  --bd:rgba(11,22,40,.09);--bd2:rgba(11,22,40,.18);
  --sh:0 1px 3px rgba(0,0,0,.06),0 3px 8px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.05);
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
  /* Sidebar */
  --sidebar-w:240px;
  --sidebar-bg:#1e293b;
  --sidebar-active:#d97706;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1117;--surface:#161b25;--surface2:#1e2535;--surface3:#252d40;
  --tx:#e8eaf0;--tx2:#8899bb;--tx3:#556688;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15);
  --sh:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.25);
  --sh2:0 6px 20px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.2);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;flex-shrink:0;}
.sidebar-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.logo-icon{width:36px;height:36px;background:var(--sidebar-active);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sidebar-logo h2{font-size:15px;font-weight:700;line-height:1.2;}
.sidebar-logo span{font-size:11px;color:#94a3b8;}
.sidebar-section{padding:16px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;}
.sidebar-nav{padding:8px;flex:1;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;color:#cbd5e1;text-decoration:none;font-size:14px;font-weight:500;transition:all .15s;cursor:pointer;margin-bottom:2px;}
.nav-link:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-link.active{background:var(--sidebar-active);color:#fff;}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.8;}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.1);}
.sidebar-footer .nav-link{color:#94a3b8;font-size:13px;}

/* ── Main wrapper ── */
#main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h1{font-size:18px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px;}

/* ── Original app styles (preserved) ── */
.shell{max-width:860px;margin:0 auto;padding:1.5rem 1.5rem 3rem;}

.topbar-app{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:2rem;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--navy2),#2a4a80);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(26,45,79,.35)}
.brand-icon svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.4px}
.brand-sub{font-size:11px;color:var(--tx2);margin-top:1px}

.tabs{display:flex;gap:2px;background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--r12);padding:3px;box-shadow:var(--sh);flex-wrap:wrap}
.tab{padding:7px 15px;font-size:12px;font-weight:600;letter-spacing:.1px;border-radius:9px;border:none;background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap}
.tab.on{background:var(--navy2);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--r12);padding:14px 16px;box-shadow:var(--sh)}
.metric-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.metric-val.g{color:var(--g)}.metric-val.a{color:var(--a)}.metric-val.navy{color:var(--navy2)}

.cblock{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--r16);padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh)}
.cblock-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cavatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.cavatar::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 55%);pointer-events:none}
.cname{font-size:14px;font-weight:700}.cbank{font-size:11px;color:var(--tx2);margin-top:2px}
.cpct{margin-left:auto;text-align:right}
.cpct-val{font-size:15px;font-weight:700}
.cpct-sub{font-size:10px;color:var(--tx3)}
.pbar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cbadges{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}

.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.badge.mo{background:var(--b-bg);color:var(--b)}
.badge.qt{background:var(--a-bg);color:var(--a)}
.badge.sa{background:var(--p-bg);color:var(--p)}
.badge.yr{background:var(--g-bg);color:var(--g)}
.badge.cat{background:var(--surface2);color:var(--tx2);font-size:9px}
.badge.status-done{background:var(--g-bg);color:var(--g)}
.badge.status-pending{background:var(--a-bg);color:var(--a)}
.badge.status-waiting{background:var(--surface3);color:var(--tx3)}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.sec-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px;padding-bottom:5px;border-bottom:0.5px solid var(--bd)}

.btn{padding:8px 15px;font-size:12px;font-weight:600;border-radius:var(--r8);border:0.5px solid var(--bd2);background:var(--surface);color:var(--tx);cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.45;cursor:default;pointer-events:none}
.btn.primary{background:var(--navy2);color:#fff;border-color:var(--navy2)}.btn.primary:hover{background:var(--navy)}
.btn.green{background:var(--g);color:#fff;border-color:var(--g)}.btn.green:hover{background:#144a22}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn.gold:hover{background:#7a5408}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.danger{color:var(--r);border-color:rgba(139,28,28,.2)}.btn.danger:hover{background:var(--r-bg)}
.btn.ghost{border-color:transparent;background:transparent}.btn.ghost:hover{background:var(--surface2)}

.brow{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border:0.5px solid var(--bd);border-radius:var(--r12);margin-bottom:6px;background:var(--surface);box-shadow:var(--sh);transition:box-shadow .15s}
.brow:hover{box-shadow:var(--sh2)}
.brow.done-row{opacity:.72}
.bdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.binfo{flex:1;min-width:0}
.bname{font-size:13px;font-weight:600}
.bmeta{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.45;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.bnotes{font-size:11px;color:var(--tx3);margin-top:4px;line-height:1.5;font-style:italic}
.brow-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;min-width:60px}
.bval{font-size:14px;font-weight:700}
.bval.zero{font-size:11px;font-weight:500;color:var(--tx3);font-style:italic}
.bdue{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.bdue.ok{background:var(--g-bg);color:var(--g)}
.bdue.warn{background:var(--a-bg);color:var(--a)}
.bdue.hot{background:var(--r-bg);color:var(--r)}

.chk-wrap{display:flex;align-items:flex-start;padding-top:3px;flex-shrink:0}
.chk-wrap input[type=checkbox]{width:17px;height:17px;border-radius:5px;accent-color:var(--g);cursor:pointer}

.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;align-items:center}
.filter-label{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;flex-shrink:0}
.fbtn{padding:4px 11px;font-size:11px;font-weight:600;border-radius:20px;border:0.5px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .15s}
.fbtn:hover{background:var(--surface2)}.fbtn.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}

.info-banner{border-radius:var(--r8);padding:9px 13px;font-size:11px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.info-banner.blue{background:var(--b-bg);border:0.5px solid rgba(14,58,138,.2);color:var(--b)}
.info-banner.amber{background:var(--a-bg);border:0.5px solid rgba(122,69,0,.2);color:var(--a)}

.acct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.acct-card{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--r16);padding:16px 18px;box-shadow:var(--sh);transition:box-shadow .15s}
.acct-card:hover{box-shadow:var(--sh2)}
.acct-head{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.acct-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.acct-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 55%)}
.acct-name{font-size:13px;font-weight:700}.acct-cat{font-size:10px;color:var(--tx3);margin-top:2px}
.acct-url a{font-size:12px;color:var(--navy2);font-weight:600;text-decoration:none;word-break:break-all}
.acct-url a:hover{text-decoration:underline}
.acct-row{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:baseline}
.acct-row-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.acct-row-val{font-size:12px;color:var(--tx2);word-break:break-word}
.acct-notes{font-size:11px;color:var(--tx3);margin-top:8px;line-height:1.5;font-style:italic;border-top:0.5px solid var(--bd);padding-top:8px}
.acct-actions{display:flex;gap:6px;margin-top:10px}

.apanel{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--r16);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.apanel-icon{font-size:22px;margin-bottom:8px;display:block}
.apanel-title{font-size:14px;font-weight:700;margin-bottom:4px}
.apanel-desc{font-size:12px;color:var(--tx2);margin-bottom:13px;line-height:1.6}
.aactions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.divider{border:none;border-top:0.5px solid var(--bd);margin:13px 0}
.steps{display:flex;flex-direction:column;gap:8px}
.step{display:flex;gap:10px;align-items:flex-start}
.stepn{width:20px;height:20px;border-radius:50%;background:var(--navy2);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;margin-top:1px}
.stept{font-size:12px;line-height:1.55;color:var(--tx2)}.stept strong{font-weight:700;color:var(--tx)}

.ai-box{background:linear-gradient(135deg,var(--gold-lt),var(--surface2));border:0.5px solid rgba(160,112,16,.3);border-radius:var(--r12);padding:14px 16px;margin-top:13px}
.ai-lbl{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.ai-text{font-size:13px;line-height:1.7;white-space:pre-wrap}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid var(--bd2);border-top-color:var(--navy2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal{background:var(--surface);border-radius:var(--r20);border:0.5px solid var(--bd);padding:24px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;font-size:13px;border:0.5px solid var(--bd2);border-radius:var(--r8);background:var(--surface);color:var(--tx);font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(26,45,79,.1)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:0.5px solid var(--bd)}
.warn-box{background:var(--a-bg);border:0.5px solid rgba(122,69,0,.25);border-radius:var(--r8);padding:9px 12px;font-size:11px;color:var(--a);margin-bottom:13px;line-height:1.5}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);font-size:13px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #main-wrap{margin-left:0;}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>

<script>
const SEED_CARDS=[
  {id:'amex-plat',name:'Platinum Schwab',bank:'AMEX',color:'#1B4F9C',abbr:'AP'},
  {id:'amex-bg',  name:'Business Gold',  bank:'AMEX',color:'#A07010',abbr:'AG'},
  {id:'csr',      name:'Sapphire Reserve',bank:'Chase',color:'#1C2340',abbr:'SR'},
  {id:'ink',      name:'Ink Preferred',  bank:'Chase',color:'#1A5C35',abbr:'IP'},
  {id:'csp',      name:'Sapphire Preferred',bank:'Chase',color:'#8B5E10',abbr:'SP'},
];

const SEED_BENEFITS=[
  {id:'ag-biz',  cardId:'amex-bg',  name:'Business Credit',       value:20,  cycle:'monthly',     cat:'Business', redeemed:false,
   notes:'Use on FedEx, Grubhub, Staples, Office Depot. Enroll through AMEX account. Redeem Business Credit (Amex Gold).'},
  {id:'ag-wm',   cardId:'amex-bg',  name:'Walmart+ Membership',   value:155, cycle:'yearly',      cat:'Shopping', redeemed:false,

function save(){try{localStorage.setItem(KEY,JSON.stringify({cards:S.cards,benefits:S.benefits,accounts:S.accounts}));}catch(e){}}
function load(){
  try{const raw=localStorage.getItem(KEY);if(raw){const p=JSON.parse(raw);S.cards=p.cards||[];S.benefits=p.benefits||[];S.accounts=p.accounts||[];}}catch(e){}
  if(!S.cards.length){S.cards=clone(SEED_CARDS);S.benefits=clone(SEED_BENEFITS);S.accounts=clone(SEED_ACCOUNTS);save();}
}
function clone(x){return JSON.parse(JSON.stringify(x));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function cardById(id){return S.cards.find(c=>c.id===id);}
function cardName(id){const c=cardById(id);return c?`${c.bank} ${c.name}`:'Unknown';}
function cardColor(id){const c=cardById(id);return c?c.color:'#888';}
function cardAbbr(id){const c=cardById(id);return c?c.abbr:'??';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function daysLeft(cycle){
  const now=new Date();let end;
  if(cycle==='monthly') end=new Date(now.getFullYear(),now.getMonth()+1,0);
  else if(cycle==='quarterly'){const q=Math.floor(now.getMonth()/3);end=new Date(now.getFullYear(),(q+1)*3,0);}
  else if(cycle==='semi-annual') end=now.getMonth()<6?new Date(now.getFullYear(),5,30):new Date(now.getFullYear(),11,31);
  else end=new Date(now.getFullYear(),11,31);
  return Math.max(1,Math.ceil((end-now)/86400000));
}
function cycleEnd(cycle){
  const now=new Date();
  if(cycle==='monthly') return new Date(now.getFullYear(),now.getMonth()+1,0);
  if(cycle==='quarterly'){const q=Math.floor(now.getMonth()/3);return new Date(now.getFullYear(),(q+1)*3,0);}
  if(cycle==='semi-annual') return now.getMonth()<6?new Date(now.getFullYear(),5,30):new Date(now.getFullYear(),11,31);
  return new Date(now.getFullYear(),11,31);
}
function periodLabel(cycle){
  const now=new Date();
  if(cycle==='monthly') return now.toLocaleString('default',{month:'short',year:'numeric'});
  if(cycle==='quarterly'){const q=Math.floor(now.getMonth()/3)+1;return `Q${q} ${now.getFullYear()}`;}
  if(cycle==='semi-annual') return now.getMonth()<6?`Jan–Jun ${now.getFullYear()}`:`Jul–Dec ${now.getFullYear()}`;
  return String(now.getFullYear());
}
function cycleBadge(c){if(c==='monthly')return'mo';if(c==='quarterly')return'qt';if(c==='semi-annual')return'sa';return'yr';}
function cycleLabel(c){if(c==='semi-annual')return'Semi-Annual';return c.charAt(0).toUpperCase()+c.slice(1);}
function dueClass(d){return d<=7?'hot':d<=21?'warn':'ok';}
function stats(){
  const mon=S.benefits.filter(b=>b.value>0);
  const total=mon.reduce((s,b)=>s+b.value,0);
  const redeemed=mon.filter(b=>b.redeemed).reduce((s,b)=>s+b.value,0);
  return{total,redeemed,pending:total-redeemed,pct:total?Math.round(redeemed/total*100):0};
}

}

function p2(n){return String(n).padStart(2,'0');}
function icsDate(d){return `${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;}
function exportCal(){
  const pending=S.benefits.filter(b=>!b.redeemed);
  if(!pending.length){alert('No pending benefits to export.');return;}
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CC Benefits Tracker//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:Credit Card Benefits'];
  pending.forEach(b=>{
    const end=cycleEnd(b.cycle);const warn=new Date(end);warn.setDate(warn.getDate()-3);
    const desc=[`Card: ${cardName(b.cardId)}`,b.value?`Value: $${b.value}`:'',`Cycle: ${b.cycle}`,b.notes?`Tip: ${b.notes.slice(0,200)}`:''].filter(Boolean).join('\\n');
    lines.push('BEGIN:VEVENT',`UID:ccbt-${b.id}-warn@tracker`,`DTSTART;VALUE=DATE:${icsDate(warn)}`,`DTEND;VALUE=DATE:${icsDate(warn)}`,`SUMMARY:⚠️ 3 days left – ${b.name} (${cardName(b.cardId)})`,`DESCRIPTION:${desc}`,'BEGIN:VALARM','TRIGGER:-PT0S','ACTION:DISPLAY',`DESCRIPTION:3 days left – ${b.name}`,'END:VALARM','END:VEVENT');
    lines.push('BEGIN:VEVENT',`UID:ccbt-${b.id}-end@tracker`,`DTSTART;VALUE=DATE:${icsDate(end)}`,`DTEND;VALUE=DATE:${icsDate(end)}`,`SUMMARY:🚨 LAST DAY – ${b.name} (${cardName(b.cardId)})`,`DESCRIPTION:${desc}`,'BEGIN:VALARM','TRIGGER:-PT0S','ACTION:DISPLAY',`DESCRIPTION:Last day to redeem ${b.name}!`,'END:VALARM','END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  dl(lines.join('\r\n'),'cc-benefits.ics','text/calendar;charset=utf-8');
}
function dl(content,filename,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function exportJSON(){dl(JSON.stringify({cards:S.cards,benefits:S.benefits,accounts:S.accounts},null,2),'cc-tracker-backup.json','application/json');}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.cards||!p.benefits)throw 0;if(!confirm(`Import ${p.cards.length} cards and ${p.benefits.length} benefits?`))return;S.cards=p.cards;S.benefits=p.benefits;S.accounts=p.accounts||[];save();render();}catch{alert('Invalid backup file.');}};r.readAsText(f);};inp.click();
}

async function getAI(){
  S.aiLoading=true;S.aiText='';render();
  const st=stats();
  const list=S.benefits.filter(b=>!b.redeemed&&b.value>0).sort((a,b)=>daysLeft(a.cycle)-daysLeft(b.cycle)).map(b=>`- ${cardName(b.cardId)}: ${b.name} ($${b.value} ${b.cycle}, ${daysLeft(b.cycle)}d left)`).join('\n');
  const prompt=`My unredeemed credit card benefits:\n${list}\n\nRedeemed: $${st.redeemed}/$${st.total}.\n\nGive 4 specific, actionable tips prioritized by urgency. Numbered list, 1-2 sentences each. Be direct about HOW to redeem.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:700,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();S.aiText=d.content?.[0]?.text||'No response.';
  }catch{S.aiText='Could not connect. Try again.';}
  S.aiLoading=false;render();
}

}

  return `
  <div class="metrics">
    <div class="metric"><div class="metric-lbl">Total Annual Value</div><div class="metric-val navy">$${st.total.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-lbl">Redeemed</div><div class="metric-val g">$${st.redeemed.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-lbl">Still Available</div><div class="metric-val a">$${st.pending.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-lbl">Redemption Rate</div><div class="metric-val">${st.pct}%</div></div>
  </div>
  ${S.cards.map(card=>{
    const cb=S.benefits.filter(b=>b.cardId===card.id);
    const tot=cb.filter(b=>b.value>0).reduce((s,b)=>s+b.value,0);
    const don=cb.filter(b=>b.redeemed&&b.value>0).reduce((s,b)=>s+b.value,0);
    const pct=tot?Math.round(don/tot*100):0;
    return `<div class="cblock">
      <div class="cblock-head">
        <div class="cavatar" style="background:${card.color}">${card.abbr}</div>
        <div style="flex:1"><div class="cname">${esc(card.name)}</div><div class="cbank">${esc(card.bank)}</div></div>
        <div class="cpct"><div class="cpct-val">$${don.toLocaleString()} <span style="font-size:12px;font-weight:400;color:var(--tx2)">/ $${tot.toLocaleString()}</span></div><div class="cpct-sub">${pct}% redeemed</div></div>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%;background:${card.color}"></div></div>
      <div class="cbadges">
        ${['monthly','quarterly','semi-annual','yearly'].map(cy=>{const r=cb.filter(b=>b.cycle===cy);if(!r.length)return'';const d=r.filter(b=>b.redeemed).length;return`<span class="badge ${cycleBadge(cy)}">${cycleLabel(cy)}: ${d}/${r.length}</span>`;}).join('')}
      </div>
    </div>`;
  }).join('')}
  <div class="sec-head" style="margin-top:6px">
    <div class="sec-title">Action needed — most urgent</div>
    <button class="btn sm" onclick="getAI()">✦ AI tips</button>
  </div>
  ${urgent.length?urgent.map(b=>{const d=daysLeft(b.cycle);return`<div class="brow">
    <div class="bdot" style="background:${cardColor(b.cardId)}"></div>
    <div class="binfo"><div class="bname">${esc(b.name)}</div><div class="bmeta">${cardName(b.cardId)} <span class="badge ${cycleBadge(b.cycle)}">${cycleLabel(b.cycle)}</span></div></div>
    <div class="brow-right"><div class="bval">$${b.value}</div><span class="bdue ${dueClass(d)}">${d}d left</span></div>
    <div class="chk-wrap"><input type="checkbox" ${b.redeemed?'checked':''} onchange="toggleRedeem('${b.id}')"></div>
  </div>`}).join(''):'<div class="empty">🎉 All caught up — no urgent monetary benefits!</div>'}
  ${S.aiText||S.aiLoading?`<div class="ai-box"><div class="ai-lbl">AI Insights</div>${S.aiLoading?'<div class="spinner"></div>':`<div class="ai-text">${esc(S.aiText)}</div>`}</div>`:''}`;
}

function renderBenefits(){
  let list=S.benefits;
  if(S.bCard!=='all') list=list.filter(b=>b.cardId===S.bCard);
  if(S.bFilter!=='all') list=list.filter(b=>b.cycle===S.bFilter);
  const pending=list.filter(b=>!b.redeemed).sort((a,b)=>daysLeft(a.cycle)-daysLeft(b.cycle));
  const done=list.filter(b=>b.redeemed);
  function row(b){
    const d=daysLeft(b.cycle);
    return `<div class="brow${b.redeemed?' done-row':''}">
      <div class="bdot" style="background:${cardColor(b.cardId)}"></div>
      <div class="binfo">
        <div class="bname">${esc(b.name)}</div>
        <div class="bmeta"><span>${cardName(b.cardId)}</span><span class="badge ${cycleBadge(b.cycle)}">${cycleLabel(b.cycle)}</span><span class="badge cat">${esc(b.cat||'')}</span><span style="color:var(--tx3);font-size:10px">${periodLabel(b.cycle)}</span></div>
        ${b.notes?`<div class="bnotes">${esc(b.notes)}</div>`:''}
      </div>
      <div class="brow-right">
        ${b.value?`<div class="bval">$${b.value}</div>`:`<div class="bval zero">perk</div>`}
        <span class="bdue ${dueClass(d)}">${d}d</span>
        <div style="display:flex;gap:4px;margin-top:2px">
          <button class="btn sm ghost" onclick="editBenefit('${b.id}')">Edit</button>
          <button class="btn sm danger ghost" onclick="deleteBenefit('${b.id}')">×</button>
        </div>
      </div>
      <div class="chk-wrap"><input type="checkbox" ${b.redeemed?'checked':''} onchange="toggleRedeem('${b.id}')"></div>
    </div>`;
  }
  return `
  <div class="filters">
    <span class="filter-label">Card</span>
    <button class="fbtn ${S.bCard==='all'?'on':''}" onclick="setBCard('all')">All</button>
    ${S.cards.map(c=>`<button class="fbtn ${S.bCard===c.id?'on':''}" onclick="setBCard('${c.id}')">${c.abbr} ${esc(c.name)}</button>`).join('')}
  </div>
  <div class="filters">
    <span class="filter-label">Cycle</span>
    ${['all','monthly','quarterly','semi-annual','yearly'].map(f=>`<button class="fbtn ${S.bFilter===f?'on':''}" onclick="setBFilter('${f}')">${f==='all'?'All':cycleLabel(f)}</button>`).join('')}
    <button class="btn sm primary" style="margin-left:auto" onclick="addBenefit()">+ Add</button>
  </div>
  <div class="info-banner blue"><span>✅</span><span><strong>Check the box</strong> when you've redeemed a benefit. Progress saves automatically in your browser.</span></div>
  ${pending.length?`<div class="sec-lbl">Pending · ${pending.length}</div>${pending.map(row).join('')}`:''}
  ${done.length?`<div class="sec-lbl">Redeemed · ${done.length}</div>${done.map(row).join('')}`:''}
  ${!list.length?'<div class="empty">No benefits match your filters.</div>':''}`;
}

function renderCards(){
  return `
  <div class="sec-head"><div class="sec-title">My cards (${S.cards.length})</div><button class="btn sm primary" onclick="addCard()">+ Add card</button></div>
  ${S.cards.map(card=>{
    const cb=S.benefits.filter(b=>b.cardId===card.id);
    const tot=cb.filter(b=>b.value>0).reduce((s,b)=>s+b.value,0);
    const don=cb.filter(b=>b.redeemed&&b.value>0).reduce((s,b)=>s+b.value,0);
    const pct=tot?Math.round(don/tot*100):0;
    return `<div class="cblock">
      <div class="cblock-head">
        <div class="cavatar" style="background:${card.color};width:48px;height:48px;border-radius:12px;font-size:13px">${card.abbr}</div>
        <div style="flex:1"><div class="cname" style="font-size:15px">${esc(card.name)}</div><div class="cbank">${esc(card.bank)} · ${cb.length} benefits · $${tot.toLocaleString()}/yr monetary value</div><div style="margin-top:5px;font-size:12px;color:var(--tx2)">$${don.toLocaleString()} redeemed · ${pct}%</div></div>
        <div style="display:flex;flex-direction:column;gap:5px"><button class="btn sm" onclick="editCard('${card.id}')">Edit</button><button class="btn sm danger" onclick="deleteCard('${card.id}')">Delete</button></div>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%;background:${card.color}"></div></div>
    </div>`;
  }).join('')}
  ${!S.cards.length?'<div class="empty">No cards yet.</div>':''}`;
}

function renderAccounts(){
  let list=S.accounts;
  if(S.aCard!=='all') list=list.filter(a=>a.cardId===S.aCard);
  if(S.aFilter!=='all') list=list.filter(a=>a.cat===S.aFilter);
  const cats=[...new Set(S.accounts.map(a=>a.cat))].sort();
  return `
  <div class="filters">
    <span class="filter-label">Card</span>
    <button class="fbtn ${S.aCard==='all'?'on':''}" onclick="setACard('all')">All</button>
    ${S.cards.map(c=>`<button class="fbtn ${S.aCard===c.id?'on':''}" onclick="setACard('${c.id}')">${c.abbr} ${esc(c.name)}</button>`).join('')}
  </div>
  <div class="filters">
    <span class="filter-label">Category</span>
    <button class="fbtn ${S.aFilter==='all'?'on':''}" onclick="setAFilter('all')">All</button>
    ${cats.map(c=>`<button class="fbtn ${S.aFilter===c?'on':''}" onclick="setAFilter('${c}')">${esc(c)}</button>`).join('')}
    <button class="btn sm primary" style="margin-left:auto" onclick="addAccount()">+ Add</button>
  </div>
  <div class="info-banner amber"><span>🔒</span><span><strong>Security:</strong> Only store usernames or emails — never passwords.</span></div>
  ${list.length?`<div class="acct-grid">${list.map(a=>{const card=cardById(a.cardId);return `<div class="acct-card"><div class="acct-head"><div class="acct-icon" style="background:${card?card.color:'#555'}">${card?card.abbr:'?'}</div><div style="flex:1;min-width:0"><div class="acct-name">${esc(a.name)}</div><div class="acct-cat">${esc(a.cat||'')} · ${card?esc(card.bank+' '+card.name):'Unknown'}</div></div></div>${a.url?`<div class="acct-url">🔗 <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.url)}</a></div>`:''}${a.username?`<div class="acct-row"><span class="acct-row-lbl">Username</span><span class="acct-row-val">${esc(a.username)}</span></div>`:''}${a.notes?`<div class="acct-notes">${esc(a.notes)}</div>`:''}<div class="acct-actions"><button class="btn sm" onclick="editAccount('${a.id}')">Edit</button><button class="btn sm danger" onclick="deleteAccount('${a.id}')">Remove</button></div></div>`;}).join('')}</div>`:'<div class="empty">No accounts match your filters.</div>'}`;
}

function renderAuto(){
  const ns=notifState(),pc=S.benefits.filter(b=>!b.redeemed).length;
  return `
  <div class="apanel"><span class="apanel-icon">📅</span><div class="apanel-title">Export to calendar — recommended</div><div class="apanel-desc">Downloads a .ics file with a 3-day warning + last-day deadline for every pending benefit. Import into Google Calendar, Apple Calendar, or Outlook.</div><div class="aactions"><button class="btn green" onclick="exportCal()">Download .ics — ${pc} benefit${pc!==1?'s':''}</button></div><hr class="divider"><div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px">How to import</div><div class="steps"><div class="step"><div class="stepn">1</div><div class="stept">Click <strong>Download .ics</strong> above.</div></div><div class="step"><div class="stepn">2</div><div class="stept"><strong>Google Calendar:</strong> Settings ⚙️ → Import → choose file → Import.</div></div><div class="step"><div class="stepn">3</div><div class="stept"><strong>iPhone / Mac:</strong> open the .ics file — Calendar imports automatically.</div></div><div class="step"><div class="stepn">4</div><div class="stept">Re-download and re-import at the start of each new period.</div></div></div></div>
  <div class="apanel"><span class="apanel-icon">🔔</span><div class="apanel-title">Browser notifications</div><div class="apanel-desc">Fires a pop-up for benefits expiring within 7 days each time you open this site.</div><div class="aactions">${ns==='on'?`<button class="btn green" disabled>✓ Notifications on</button><button class="btn sm" onclick="localStorage.removeItem('ccbt_notif');render()">Turn off</button>`:ns==='unsupported'?`<button class="btn" disabled>Not supported</button>`:`<button class="btn primary" onclick="enableNotif()">Enable notifications</button>`}</div></div>
  <div class="apanel"><span class="apanel-icon">💾</span><div class="apanel-title">Backup &amp; restore</div><div class="apanel-desc">Export as JSON. Import on any device or after clearing browser data.</div><div class="aactions"><button class="btn" onclick="exportJSON()">Export backup</button><button class="btn" onclick="importJSON()">Import backup</button><button class="btn danger" onclick="resetData()">Reset to defaults</button></div></div>`;
}

const PALETTE=['#1B4F9C','#A07010','#1C2340','#1A5C35','#8B5E10','#7B2A8B','#C0392B','#2C7E85','#444','#6D3B47'];
function renderCardModal(data){return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">${data?'Edit card':'Add card'}</div><div class="modal-sub">Card display info and color.</div><div class="field-row"><div class="field"><label>Card name</label><input id="f-name" value="${esc(data?.name||'')}" placeholder="Platinum Schwab"></div><div class="field"><label>Bank</label><input id="f-bank" value="${esc(data?.bank||'')}" placeholder="AMEX"></div></div><div class="field"><label>Abbreviation (2–3 letters)</label><input id="f-abbr" value="${esc(data?.abbr||'')}" placeholder="AP" maxlength="3"></div><div class="field"><label>Color</label><div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;align-items:center">${PALETTE.map(c=>`<div class="color-dot" style="background:${c};outline:${(data?.color||PALETTE[0])===c?'3px solid var(--tx)':'none'};outline-offset:2px" onclick="document.getElementById('f-color').value='${c}';document.querySelectorAll('.color-dot').forEach(x=>x.style.outline='none');this.style.outline='3px solid var(--tx)';this.style.outlineOffset='2px'"></div>`).join('')}<input type="color" id="f-color" value="${data?.color||PALETTE[0]}" style="width:28px;height:22px;border:none;background:transparent;cursor:pointer;padding:0"></div></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveCard('${data?.id||''}')">Save</button></div></div></div>`;}
function renderBenefitModal(data){const cardOpts=S.cards.map(c=>`<option value="${c.id}" ${data?.cardId===c.id?'selected':''}>${c.bank} ${c.name}</option>`).join('');const cycles=['monthly','quarterly','semi-annual','yearly'];const cycleOpts=cycles.map(c=>`<option value="${c}" ${data?.cycle===c?'selected':''}>${cycleLabel(c)}</option>`).join('');const cats=['Travel','Dining','Transport','Shopping','Entertainment','Health','Business','Insurance','Rewards','Other'];const catOpts=cats.map(c=>`<option ${data?.cat===c?'selected':''}>${c}</option>`).join('');return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">${data?'Edit benefit':'Add benefit'}</div><div class="modal-sub">Benefit details and redemption notes.</div><div class="field"><label>Card</label><select id="f-card">${cardOpts}</select></div><div class="field"><label>Benefit name</label><input id="f-bname" value="${esc(data?.name||'')}" placeholder="e.g. Uber Cash"></div><div class="field-row"><div class="field"><label>Value $ (0 = perk)</label><input id="f-val" type="number" value="${data?.value||0}" min="0" step="1"></div><div class="field"><label>Cycle</label><select id="f-cycle">${cycleOpts}</select></div></div><div class="field"><label>Category</label><select id="f-cat">${catOpts}</select></div><div class="field"><label>Redemption notes</label><textarea id="f-notes" placeholder="How to redeem, enrollment steps, restrictions...">${esc(data?.notes||'')}</textarea></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveBenefit('${data?.id||''}')">Save</button></div></div></div>`;}
function renderAccountModal(data){const cardOpts=S.cards.map(c=>`<option value="${c.id}" ${data?.cardId===c.id?'selected':''}>${c.bank} ${c.name}</option>`).join('');const cats=['Card Portal','Travel','Dining','Transport','Shopping','Entertainment','Health','Business','Rewards','Other'];const catOpts=cats.map(c=>`<option ${data?.cat===c?'selected':''}>${c}</option>`).join('');return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">${data?'Edit account':'Add account'}</div><div class="modal-sub">Redemption portal, URL, and login info.</div><div class="warn-box">🔒 Only store usernames/emails — <strong>never passwords</strong>.</div><div class="field"><label>Portal / Service name</label><input id="a-name" value="${esc(data?.name||'')}" placeholder="e.g. Chase Travel Portal"></div><div class="field"><label>URL</label><input id="a-url" type="url" value="${esc(data?.url||'')}" placeholder="https://"></div><div class="field-row"><div class="field"><label>Linked card</label><select id="a-card">${cardOpts}</select></div><div class="field"><label>Category</label><select id="a-cat">${catOpts}</select></div></div><div class="field"><label>Username / Email (no passwords)</label><input id="a-user" value="${esc(data?.username||'')}" placeholder="your@email.com" autocomplete="off"></div><div class="field"><label>Notes &amp; redemption tips</label><textarea id="a-notes" placeholder="Redemption instructions, tips...">${esc(data?.notes||'')}</textarea></div><div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveAccount('${data?.id||''}')">Save</button></div></div></div>`;}

function render(){
  document.getElementById('tabs').querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('on',['dash','benefits','cards','accounts','auto'][i]===S.tab);
  });
  let html='';
  if(S.tab==='dash') html=renderDash();
  else if(S.tab==='benefits') html=renderBenefits();
  else if(S.tab==='cards') html=renderCards();
  else if(S.tab==='accounts') html=renderAccounts();
  else html=renderAuto();
  if(S.modal){
    if(S.modal.type==='card') html+=renderCardModal(S.modal.data);
    else if(S.modal.type==='benefit') html+=renderBenefitModal(S.modal.data);
    else if(S.modal.type==='account') html+=renderAccountModal(S.modal.data);
  }
  document.getElementById('app').innerHTML=html;
}

load();render();checkNotif();
</script>
</body>
</html>
